  <g id="labels" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="550" y="48" font-size="20" fill="#ffffff" font-weight="700">vcfr:VCFFile</text>
    <text x="550" y="66" font-size="12" fill="#e5f7fa">fileFormat, fileDate, sourceSoftware, referenceGenome</text>

    <text x="275" y="156" font-size="17" fill="#173d57" font-weight="700">vcfr:VCFHeader</text>
    <text x="275" y="176" font-size="12" fill="#365d76">Container for structured VCF header lines</text>

    <text x="215" y="272" font-size="16" fill="#173d57" font-weight="700">vcfr:HeaderLine</text>
    <text x="215" y="291" font-size="12" fill="#365d76">headerKey, headerValue</text>

    <text x="485" y="272" font-size="16" fill="#173d57" font-weight="700">vcfr:FieldDefinition</text>
    <text x="485" y="291" font-size="12" fill="#365d76">fieldId, fieldNumber, fieldType, fieldDescription</text>

    <text x="485" y="372" font-size="14" fill="#173d57" font-weight="700">vcfr:Info/Format/Filter/AltDefinition</text>
    <text x="485" y="390" font-size="12" fill="#365d76">Representative header definition subclasses</text>

    <text x="825" y="156" font-size="17" fill="#173d57" font-weight="700">vcfr:VCFRecord</text>
    <text x="825" y="176" font-size="12" fill="#365d76">chrom, pos, recordId, ref, alt</text>

    <text x="825" y="272" font-size="16" fill="#314c2a" font-weight="700">vcfr:VariantCall</text>
    <text x="825" y="291" font-size="12" fill="#4f6844">qual, filter, infoRaw, formatRaw</text>

    <text x="825" y="374" font-size="16" fill="#314c2a" font-weight="700">vcfr:SampleCall</text>
    <text x="825" y="393" font-size="12" fill="#4f6844">sampleId</text>

    <text x="745" y="272" font-size="15" fill="#314c2a" font-weight="700">vcfr:VCFValueType</text>
    <text x="745" y="291" font-size="12" fill="#4f6844">Integer, Float, Flag, Character, String</text>

    <text x="745" y="372" font-size="15" fill="#5f4f25" font-weight="700">vcfr:VCFNumberArity</text>
    <text x="745" y="390" font-size="12" fill="#6f6338">0, 1, A, R, G, .</text>

    <text x="1020" y="272" font-size="14" fill="#5f4f25" font-weight="700">vcfr:InfoFieldValue</text>
    <text x="1020" y="291" font-size="11.5" fill="#6f6338">fieldValue*</text>

    <text x="1020" y="374" font-size="14" fill="#5f4f25" font-weight="700">vcfr:FormatFieldValue</text>
    <text x="1020" y="393" font-size="11.5" fill="#6f6338">fieldValue*</text>
