name: Deploy GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare docs assets
        run: |
          mkdir -p docs/assets
          cp ontology/vcf-rdfizer-vocabulary.ttl docs/assets/
          cp shacl/vcf-rdfizer-vocabulary.shacl.ttl docs/assets/
          cp examples/example-headers.ttl docs/assets/
          cp examples/example-minimal-record.ttl docs/assets/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
